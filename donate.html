<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Donate Food | BhojSetu</title>

    <link rel="stylesheet" href="donate.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="container">

        <img src="logo.png"
             alt="BhojSetu Logo"
             class="form-logo">

        <h1>Donate Food</h1>

        <p class="subtitle">
            Help reduce food waste by donating surplus food.
        </p>

        <form id="donationForm">

            <div class="input-group">

                <label>Donor Name</label>

                <input type="text"
                       id="donorName"
                       placeholder="Enter your name"
                       required>

            </div>

            <div class="input-group">

                <label>Phone Number</label>

                <input type="tel"
                       id="phone"
                       placeholder="Enter phone number"
                       required>

            </div>

            <div class="input-group">

                <label>Location</label>

                <input type="text"
                       id="location"
                       placeholder="Enter pickup location"
                       required>

            </div>

            <div class="input-group">

                <label>Food Type</label>

                <select id="foodType" required>

                    <option value="">Select Food Type</option>

                    <option>Cooked Food</option>

                    <option>Packed Food</option>

                    <option>Raw Food</option>

                </select>

            </div>

            <div class="input-group">

                <label>Food Quality Status</label>

                <select id="qualityStatus" required>

                    <option value="">Select Status</option>

                    <option>Freshly Prepared (0–4 Hours)</option>

                    <option>Prepared Within 4–8 Hours</option>

                    <option>Packed & Sealed Food</option>

                </select>

            </div>

            <div class="input-group">

                <label>Quantity</label>

                <input type="text"
                       id="quantity"
                       placeholder="Example: Serves 20 people"
                       required>

            </div>

            <div class="input-group">

                <label>Pickup Time</label>

                <input type="time"
                       id="pickupTime"
                       required>

            </div>

            <div class="input-group">

                <label>Expiry / Best Before Time</label>

                <input type="datetime-local"
                       id="expiryTime"
                       required>

            </div>

            <div class="input-group">

                <label>Additional Notes</label>

                <textarea id="notes"
                          rows="4"
                          placeholder="Any special instructions"></textarea>

            </div>

            <h3 class="section-title">
                Food Safety Declaration
            </h3>

            <div class="checkbox-group">

                <input type="checkbox"
                       id="confirm"
                       required>

                <label for="confirm">

                    I confirm that the food is hygienic,
                    properly stored and safe for consumption.

                </label>

            </div>

            <button type="submit">

                Submit Donation

            </button>

        </form>

    </div>

    <script>

        document.getElementById("donationForm")
            .addEventListener("submit", async function (e) {

                e.preventDefault();

                const donationData = {

                    donorName:
                        document.getElementById("donorName").value,

                    phone:
                        document.getElementById("phone").value,

                    location:
                        document.getElementById("location").value,

                    foodType:
                        document.getElementById("foodType").value,

                    qualityStatus:
                        document.getElementById("qualityStatus").value,

                    quantity:
                        document.getElementById("quantity").value,

                    pickupTime:
                        document.getElementById("pickupTime").value,

                    expiryTime:
                        document.getElementById("expiryTime").value,

                    notes:
                        document.getElementById("notes").value

                };

                try {

                    const response = await fetch(
                        "http://localhost:3000/donate",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify(donationData)
                        }
                    );

                    const result = await response.json();

                    alert(
    result.message +
    "\n\nDonation ID: " +
    result.donationId
);
                    document.getElementById("donationForm").reset();

                }

                catch (error) {

                    alert("Error connecting to server.");

                    console.error(error);

                }

            });

    </script>

</body>

</html>
