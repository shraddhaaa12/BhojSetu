<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Donate Food | BhojSetu</title>

    <link rel="stylesheet"
          href="donate.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="container">

        <img src="logo.png"
             alt="BhojSetu Logo"
             class="form-logo">

        <h1>Donate Food</h1>

        <p class="subtitle">
            Help reduce food waste by donating surplus food.
        </p>

        <form>

            <div class="input-group">

                <label>Donor Name</label>

                <input type="text"
                       placeholder="Enter your name">

            </div>

            <div class="input-group">

                <label>Phone Number</label>

                <input type="tel"
                       placeholder="Enter phone number">

            </div>

            <div class="input-group">

                <label>Location</label>

                <input type="text"
                       placeholder="Enter pickup location">

            </div>

            <div class="input-group">

                <label>Food Type</label>

                <select>

                    <option>Select Food Type</option>

                    <option>Cooked Food</option>

                    <option>Packed Food</option>

                    <option>Raw Food</option>

                </select>

            </div>

            <div class="input-group">

                <label>Food Quality Status</label>

                <select>

                    <option>Select Status</option>

                    <option>Freshly Prepared (0–4 Hours)</option>

                    <option>Prepared Within 4–8 Hours</option>

                    <option>Packed & Sealed Food</option>

                </select>

            </div>

            <div class="input-group">

                <label>Quantity</label>

                <input type="text"
                       placeholder="Example: Serves 20 people">

            </div>

            <div class="input-group">

                <label>Pickup Time</label>

                <input type="time">

            </div>

            <div class="input-group">

                <label>Expiry / Best Before Time</label>

                <input type="datetime-local">

            </div>

            <div class="input-group">

                <label>Additional Notes</label>

                <textarea rows="4"
                          placeholder="Any special instructions"></textarea>

            </div>

            <h3 class="section-title">
                Food Safety Declaration
            </h3>

            <div class="checkbox-group">

                <input type="checkbox"
                       id="confirm">

                <label for="confirm">

                    I confirm that the food is hygienic,
                    properly stored and safe for consumption.

                </label>

            </div>

            <button type="submit">

                Submit Donation

            </button>

        </form>

    </div>

</body>

</html>
