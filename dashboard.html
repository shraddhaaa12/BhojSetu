<!DOCTYPE html>

<html lang="en">

<head>


<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Dashboard | BhojSetu</title>

<link rel="stylesheet"
      href="dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">


</head>

<body>


<div class="dashboard-container">

    <!-- LOGO -->

    <img src="logo.png"
         alt="BhojSetu Logo"
         class="dashboard-logo">

    <h1>Dashboard</h1>

    <!-- STATS -->

    <div class="stats-container">

        <div class="stat-card">

            <h2 id="totalDonations">0</h2>

            <p>Total Donations</p>

        </div>

        <div class="stat-card">

            <h2 id="totalNGOs">0</h2>

            <p>Partner NGOs</p>

        </div>

        <div class="stat-card">

            <h2 id="mealsSaved">0</h2>

            <p>Meals Saved</p>

        </div>

        <div class="stat-card">

            <h2 id="citiesCovered">0</h2>

            <p>Cities Covered</p>

        </div>

    </div>

    <!-- DONATIONS TABLE -->

    <h2 class="section-heading">

        Current Food Donations

    </h2>

    <table>

        <thead>

            <tr>

                <th>Food Type</th>
                <th>Quantity</th>
                <th>Location</th>
                <th>Status</th>

            </tr>

        </thead>

        <tbody id="donationTable">

        </tbody>

    </table>

    <!-- AI PANEL -->

    <div class="ai-panel">

        <h2>🤖 AI Recommendation</h2>

        <p>
            <strong>Priority:</strong> HIGH
        </p>

        <p>

    <strong>Suggested NGO:</strong>

    <span id="recommendedNgo">

        Loading...

    </span>

</p>

<p>
    <strong>Reason:</strong>

    <span id="recommendationReason">

        Loading...

    </span>

</p>

    </div>

    <!-- NGO TABLE -->

    <h2 class="section-heading">

        Registered NGOs

    </h2>

    <table>

        <thead>

            <tr>

                <th>NGO Name</th>
                <th>Contact Person</th>
                <th>Area Served</th>

            </tr>

        </thead>

        <tbody id="ngoTable">

        </tbody>

    </table>

</div>

<script>

async function loadDashboard() {

    try {

        const donationResponse =
            await fetch("http://localhost:3000/donations");

        const donations =
            await donationResponse.json();

        const ngoResponse =
            await fetch("http://localhost:3000/ngos");

        const ngos =
            await ngoResponse.json();

        // TOTAL DONATIONS

        document.getElementById(
            "totalDonations"
        ).innerText =
            donations.length;

        // TOTAL NGOs

        document.getElementById(
            "totalNGOs"
        ).innerText =
            ngos.length;

        // MEALS SAVED

        let totalMeals = 0;

        donations.forEach(donation => {

            const mealCount =
                parseInt(
                    String(donation.quantity)
                        .replace(/[^0-9]/g, "")
                ) || 0;

            totalMeals += mealCount;

        });

        document.getElementById(
            "mealsSaved"
        ).innerText =
            totalMeals;

        // CITIES COVERED

        const uniqueCities = [

            ...new Set(

                donations.map(
                    donation =>
                        donation.location
                            .trim()
                            .toLowerCase()
                )

            )

        ];

        document.getElementById(
            "citiesCovered"
        ).innerText =
            uniqueCities.length;

        // DONATION TABLE

        const donationTable =
            document.getElementById(
                "donationTable"
            );

        donationTable.innerHTML = "";

        donations.forEach(donation => {

            donationTable.innerHTML += `

            <tr>

                <td>${donation.foodType || "-"}</td>

                <td>${donation.quantity || "-"}</td>

                <td>${donation.location || "-"}</td>

                <td>Pending Pickup</td>

            </tr>

            `;

        });

        // NGO TABLE

        const ngoTable =
            document.getElementById(
                "ngoTable"
            );

        ngoTable.innerHTML = "";

        ngos.forEach(ngo => {

            ngoTable.innerHTML += `

            <tr>

                <td>${ngo.ngoName || "-"}</td>

                <td>${ngo.contactPerson || "-"}</td>

                <td>${ngo.areasServed || "-"}</td>

            </tr>

            `;

        });

        // AI RECOMMENDATION

        if (
            donations.length > 0 &&
            ngos.length > 0
        ) {

            const latestDonation =
                donations[
                    donations.length - 1
                ];

            const suggestedNgo =
                ngos[
                    Math.floor(
                        Math.random() *
                        ngos.length
                    )
                ];

            document.getElementById(
                "recommendedNgo"
            ).innerText =
                suggestedNgo.ngoName;

            document.getElementById(
                "recommendationReason"
            ).innerText =
                `Recommended for ${latestDonation.foodType} donation at ${latestDonation.location}`;

        }

        else if (
            donations.length === 0
        ) {

            document.getElementById(
                "recommendedNgo"
            ).innerText =
                "No Donations Found";

            document.getElementById(
                "recommendationReason"
            ).innerText =
                "Add a donation first";

        }

        else {

            document.getElementById(
                "recommendedNgo"
            ).innerText =
                "No NGO Registered";

            document.getElementById(
                "recommendationReason"
            ).innerText =
                "Register NGOs first";

        }

    }

    catch (error) {

        console.error(error);

        document.getElementById(
            "recommendedNgo"
        ).innerText =
            "Server Offline";

        document.getElementById(
            "recommendationReason"
        ).innerText =
            "Unable to fetch data";

        alert(
            "Unable to load dashboard data."
        );

    }

}

loadDashboard();

</script>

</body>

</html>
