<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>NGO Registration | BhojSetu</title>

    <link rel="stylesheet"
          href="ngo.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="container">

        <img src="logo.png"
             alt="BhojSetu Logo"
             class="form-logo">

        <h1>NGO Registration</h1>

        <p class="subtitle">
            Register your NGO to receive and distribute food donations.
        </p>

        <form id="ngoForm">

            <div class="input-group">

                <label>NGO Name</label>

                <input type="text"
                       id="ngoName"
                       placeholder="Enter NGO name"
                       required>

            </div>

            <div class="input-group">

                <label>Registration Number</label>

                <input type="text"
                       id="registrationNumber"
                       placeholder="Enter registration number"
                       required>

            </div>

            <div class="input-group">

                <label>Contact Person</label>

                <input type="text"
                       id="contactPerson"
                       placeholder="Enter contact person name"
                       required>

            </div>

            <div class="input-group">

                <label>Phone Number</label>

                <input type="tel"
                       id="phone"
                       placeholder="Enter phone number"
                       required>

            </div>

            <div class="input-group">

                <label>Email Address</label>

                <input type="email"
                       id="email"
                       placeholder="Enter email address"
                       required>

            </div>

            <div class="input-group">

                <label>NGO Address</label>

                <textarea id="address"
                          rows="3"
                          placeholder="Enter NGO address"
                          required></textarea>

            </div>

            <div class="input-group">

                <label>Areas Served</label>

                <input type="text"
                       id="areasServed"
                       placeholder="Example: Noida, Greater Noida, Ghaziabad"
                       required>

            </div>

            <button type="submit">

                Register NGO

            </button>

        </form>

    </div>

    <script>

        document.getElementById("ngoForm")
            .addEventListener("submit", async function (e) {

                e.preventDefault();

                const ngoData = {

                    ngoName:
                        document.getElementById("ngoName").value,

                    registrationNumber:
                        document.getElementById("registrationNumber").value,

                    contactPerson:
                        document.getElementById("contactPerson").value,

                    phone:
                        document.getElementById("phone").value,

                    email:
                        document.getElementById("email").value,

                    address:
                        document.getElementById("address").value,

                    areasServed:
                        document.getElementById("areasServed").value

                };

                try {

                    const response = await fetch(
                        "http://localhost:3000/ngo",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify(ngoData)
                        }
                    );

                    const result = await response.json();

                    alert(result.message);

                    document.getElementById("ngoForm").reset();

                }

                catch (error) {

                    alert("Error connecting to server.");

                    console.error(error);

                }

            });

    </script>

</body>

</html>
