<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>NGO Registration | BhojSetu</title>

    <link rel="stylesheet"
          href="ngo.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="container">

        <img src="logo.png"
             alt="BhojSetu Logo"
             class="form-logo">

        <h1>NGO Registration</h1>

        <p class="subtitle">
            Register your NGO to receive and distribute food donations.
        </p>

        <form>

            <div class="input-group">

                <label>NGO Name</label>

                <input type="text"
                       placeholder="Enter NGO name">

            </div>

            <div class="input-group">

                <label>Registration Number</label>

                <input type="text"
                       placeholder="Enter registration number">

            </div>

            <div class="input-group">

                <label>Contact Person</label>

                <input type="text"
                       placeholder="Enter contact person name">

            </div>

            <div class="input-group">

                <label>Phone Number</label>

                <input type="tel"
                       placeholder="Enter phone number">

            </div>

            <div class="input-group">

                <label>Email Address</label>

                <input type="email"
                       placeholder="Enter email address">

            </div>

            <div class="input-group">

                <label>NGO Address</label>

                <textarea rows="3"
                          placeholder="Enter NGO address"></textarea>

            </div>

            <div class="input-group">

                <label>Areas Served</label>

                <input type="text"
                       placeholder="Example: Noida, Greater Noida, Ghaziabad">

            </div>

            <button type="submit">

                Register NGO

            </button>

        </form>

    </div>

</body>

</html>
